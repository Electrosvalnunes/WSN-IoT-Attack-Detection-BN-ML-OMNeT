[General]
network = wsn36.WSN36_Grid_Topology
sim-time-limit = 900s
repeat = 1
seed-set = ${repetition}

# ============================================================
# METODOLOGIA TRADUZIDA PARA OMNeT++/INET
# ============================================================
# Cenário: Rede de Sensores sem Fio com 36 sensores + 1 sink
# Área: 400 m x 400 m
# Topologia: grade 6 x 6
# Distância média entre nós: 80 m
# Sink: centro da topologia
# Tempo de simulação: 900 s
# Tempo de convergência inicial: 80 s
# Potência de transmissão: 1.2 mW
# Tamanho normal do pacote: 48 B
# Número máximo de retransmissões: 10
# Cenários: Normal, Flooding, Backoff, Blackhole e Wormhole
# Métricas: PDR, delay, throughput e energia residual/consumida
# ============================================================

# Saídas estatísticas
output-scalar-file = results/${configname}-${runnumber}.sca
output-vector-file = results/${configname}-${runnumber}.vec
**.scalar-recording = true
**.vector-recording = true
record-eventlog = false

# Visualização
*.visualizer.*.interfaceTableVisualizer.displayInterfaceTables = true
*.visualizer.*.routingTableVisualizer.displayRoutingTables = false
*.visualizer.*.transportConnectionVisualizer.displayTransportConnections = true
*.visualizer.*.packetDropVisualizer.displayPacketDrops = true
*.visualizer.*.mediumVisualizer.displaySignals = true

# Área física da simulação
**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMinZ = 0m
**.constraintAreaMaxX = 400m
**.constraintAreaMaxY = 400m
**.constraintAreaMaxZ = 0m

# Mobilidade fixa
*.sensor[*].mobility.typename = "StationaryMobility"
*.sink.mobility.typename = "StationaryMobility"

# Sink no centro da rede
*.sink.mobility.initialX = 200m
*.sink.mobility.initialY = 200m
*.sink.mobility.initialZ = 0m

# Coordenadas dos 36 sensores em grade 6 x 6, espaçamento de 80 m
*.sensor[0].mobility.initialX = 0m
*.sensor[0].mobility.initialY = 0m
*.sensor[1].mobility.initialX = 80m
*.sensor[1].mobility.initialY = 0m
*.sensor[2].mobility.initialX = 160m
*.sensor[2].mobility.initialY = 0m
*.sensor[3].mobility.initialX = 240m
*.sensor[3].mobility.initialY = 0m
*.sensor[4].mobility.initialX = 320m
*.sensor[4].mobility.initialY = 0m
*.sensor[5].mobility.initialX = 400m
*.sensor[5].mobility.initialY = 0m

*.sensor[6].mobility.initialX = 0m
*.sensor[6].mobility.initialY = 80m
*.sensor[7].mobility.initialX = 80m
*.sensor[7].mobility.initialY = 80m
*.sensor[8].mobility.initialX = 160m
*.sensor[8].mobility.initialY = 80m
*.sensor[9].mobility.initialX = 240m
*.sensor[9].mobility.initialY = 80m
*.sensor[10].mobility.initialX = 320m
*.sensor[10].mobility.initialY = 80m
*.sensor[11].mobility.initialX = 400m
*.sensor[11].mobility.initialY = 80m

*.sensor[12].mobility.initialX = 0m
*.sensor[12].mobility.initialY = 160m
*.sensor[13].mobility.initialX = 80m
*.sensor[13].mobility.initialY = 160m
*.sensor[14].mobility.initialX = 160m
*.sensor[14].mobility.initialY = 160m
*.sensor[15].mobility.initialX = 240m
*.sensor[15].mobility.initialY = 160m
*.sensor[16].mobility.initialX = 320m
*.sensor[16].mobility.initialY = 160m
*.sensor[17].mobility.initialX = 400m
*.sensor[17].mobility.initialY = 160m

*.sensor[18].mobility.initialX = 0m
*.sensor[18].mobility.initialY = 240m
*.sensor[19].mobility.initialX = 80m
*.sensor[19].mobility.initialY = 240m
*.sensor[20].mobility.initialX = 160m
*.sensor[20].mobility.initialY = 240m
*.sensor[21].mobility.initialX = 240m
*.sensor[21].mobility.initialY = 240m
*.sensor[22].mobility.initialX = 320m
*.sensor[22].mobility.initialY = 240m
*.sensor[23].mobility.initialX = 400m
*.sensor[23].mobility.initialY = 240m

*.sensor[24].mobility.initialX = 0m
*.sensor[24].mobility.initialY = 320m
*.sensor[25].mobility.initialX = 80m
*.sensor[25].mobility.initialY = 320m
*.sensor[26].mobility.initialX = 160m
*.sensor[26].mobility.initialY = 320m
*.sensor[27].mobility.initialX = 240m
*.sensor[27].mobility.initialY = 320m
*.sensor[28].mobility.initialX = 320m
*.sensor[28].mobility.initialY = 320m
*.sensor[29].mobility.initialX = 400m
*.sensor[29].mobility.initialY = 320m

*.sensor[30].mobility.initialX = 0m
*.sensor[30].mobility.initialY = 400m
*.sensor[31].mobility.initialX = 80m
*.sensor[31].mobility.initialY = 400m
*.sensor[32].mobility.initialX = 160m
*.sensor[32].mobility.initialY = 400m
*.sensor[33].mobility.initialX = 240m
*.sensor[33].mobility.initialY = 400m
*.sensor[34].mobility.initialX = 320m
*.sensor[34].mobility.initialY = 400m
*.sensor[35].mobility.initialX = 400m
*.sensor[35].mobility.initialY = 400m

# Interface sem fio IEEE 802.15.4 aproximada
*.sensor[*].wlan[0].typename = "Ieee802154NarrowbandInterface"
*.sink.wlan[0].typename = "Ieee802154NarrowbandInterface"
*.sensor[*].wlan[0].radio.transmitter.power = 1.2mW
*.sink.wlan[0].radio.transmitter.power = 1.2mW
*.sensor[*].wlan[0].mac.maxFrameRetries = 10
*.sink.wlan[0].mac.maxFrameRetries = 10

# Configuração IP automática
*.configurator.addStaticRoutes = true
*.configurator.addDefaultRoutes = true
*.configurator.optimizeRoutes = true

# Aplicações UDP: sensores enviam dados para o sink
*.sink.numApps = 1
*.sink.app[0].typename = "UdpSink"
*.sink.app[0].localPort = 5000

*.sensor[*].numApps = 1
*.sensor[*].app[0].typename = "UdpBasicApp"
*.sensor[*].app[0].destAddresses = "sink"
*.sensor[*].app[0].destPort = 5000
*.sensor[*].app[0].messageLength = 48B
*.sensor[*].app[0].sendInterval = 1s
*.sensor[*].app[0].startTime = uniform(80s, 90s)
*.sensor[*].app[0].stopTime = 900s

# ============================================================
# CENÁRIO 1: NORMAL
# ============================================================
[Config Normal]
description = "Cenário normal: 36 sensores enviando pacotes UDP de 48 B para o sink."

# ============================================================
# CENÁRIO 2: FLOODING
# Atacante: sensor[0]
# Janela do ataque: 20 s até 250 s
# Pacote de ataque: 119 B
# Intervalo de ataque: 0.12 s
# ============================================================
[Config Flooding]
extends = Normal
description = "Ataque Flooding: sensor[0] gera tráfego intenso contra o sink."
*.sensor[0].numApps = 2
*.sensor[0].app[1].typename = "UdpBasicApp"
*.sensor[0].app[1].destAddresses = "sink"
*.sensor[0].app[1].destPort = 5000
*.sensor[0].app[1].messageLength = 119B
*.sensor[0].app[1].sendInterval = 0.12s
*.sensor[0].app[1].startTime = 20s
*.sensor[0].app[1].stopTime = 250s

# ============================================================
# CENÁRIO 3: BACKOFF MANIPULADO
# Atacante: sensor[25]
# Janela sugerida: 200 s até 250 s
# Observação: os nomes exatos dos parâmetros MAC podem variar por versão do INET.
# ============================================================
[Config Backoff]
extends = Normal
description = "Ataque de Backoff manipulado: sensor[25] usa contenção agressiva no MAC."
*.sensor[25].numApps = 2
*.sensor[25].app[1].typename = "UdpBasicApp"
*.sensor[25].app[1].destAddresses = "sink"
*.sensor[25].app[1].destPort = 5000
*.sensor[25].app[1].messageLength = 48B
*.sensor[25].app[1].sendInterval = 0.05s
*.sensor[25].app[1].startTime = 200s
*.sensor[25].app[1].stopTime = 250s

# ============================================================
# CENÁRIO 4: BLACKHOLE
# Atacante: sensor[5]
# Janela sugerida: 200 s até 250 s

# ============================================================
[Config Blackhole]
extends = Normal
description = "Blackhole aproximado: sensor[5] representa nó malicioso de descarte/perturbação."
*.sensor[5].numApps = 2
*.sensor[5].app[1].typename = "UdpBasicApp"
*.sensor[5].app[1].destAddresses = "sink"
*.sensor[5].app[1].destPort = 5000
*.sensor[5].app[1].messageLength = 48B
*.sensor[5].app[1].sendInterval = 0.08s
*.sensor[5].app[1].startTime = 200s
*.sensor[5].app[1].stopTime = 250s

# ============================================================
# CENÁRIO 5: WORMHOLE
# Atacantes: sensor[25] e sensor[15]
# Janela sugerida: 200 s até 250 s

# ============================================================
[Config Wormhole]
extends = Normal
description = "Wormhole aproximado: sensores[25] e [15] atuam como par malicioso."
*.sensor[25].numApps = 2
*.sensor[25].app[1].typename = "UdpBasicApp"
*.sensor[25].app[1].destAddresses = "sink"
*.sensor[25].app[1].destPort = 5000
*.sensor[25].app[1].messageLength = 48B
*.sensor[25].app[1].sendInterval = 0.07s
*.sensor[25].app[1].startTime = 200s
*.sensor[25].app[1].stopTime = 250s

*.sensor[15].numApps = 2
*.sensor[15].app[1].typename = "UdpBasicApp"
*.sensor[15].app[1].destAddresses = "sink"
*.sensor[15].app[1].destPort = 5000
*.sensor[15].app[1].messageLength = 48B
*.sensor[15].app[1].sendInterval = 0.07s
*.sensor[15].app[1].startTime = 200s
*.sensor[15].app[1].stopTime = 250s
