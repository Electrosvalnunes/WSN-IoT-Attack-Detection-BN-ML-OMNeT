*.sensor[15].mobility.initialY = 160m
*.sensor[16].mobility.initialX = 320m
*.sensor[16].mobility.initialY = 160m
*.sensor[17].mobility.initialX = 400m
*.sensor[17].mobility.initialY = 160m
*.sensor[18].mobility.initialX = 0m
*.sensor[18].mobility.initialY = 240m
*.sensor[19].mobility.initialX = 80m
*.sensor[19].mobility.initialY = 240m
*.sensor[20].mobility.initialX = 160m
*.sensor[20].mobility.initialY = 240m
*.sensor[21].mobility.initialX = 240m
*.sensor[21].mobility.initialY = 240m
*.sensor[22].mobility.initialX = 320m
*.sensor[22].mobility.initialY = 240m
*.sensor[23].mobility.initialX = 400m
*.sensor[23].mobility.initialY = 240m
*.sensor[24].mobility.initialX = 0m
*.sensor[24].mobility.initialY = 320m
*.sensor[25].mobility.initialX = 80m
