# Interface IEEE 802.15.4 aproximada
*.sensor[*].wlan[0].typename = "Ieee802154NarrowbandInterface"
*.sink.wlan[0].typename = "Ieee802154NarrowbandInterface"
*.sensor[*].wlan[0].radio.transmitter.power = 1.2mW
*.sink.wlan[0].radio.transmitter.power = 1.2mW
*.sensor[*].wlan[0].mac.maxFrameRetries = 10
*.sink.wlan[0].mac.maxFrameRetries = 10

# Configuração IP automática
*.configurator.addStaticRoutes = true
*.configurator.addDefaultRoutes = true
*.configurator.optimizeRoutes = true

# Aplicação normal: todos os sensores enviam UDP ao sink após 80 s
*.sink.numApps = 1
*.sink.app[0].typename = "UdpSink"
*.sink.app[0].localPort = 5000

*.sensor[*].numApps = 1
*.sensor[*].app[0].typename = "UdpBasicApp"
*.sensor[*].app[0].destAddresses = "sink"
*.sensor[*].app[0].destPort = 5000
*.sensor[*].app[0].messageLength = 48B
*.sensor[*].app[0].sendInterval = 1s
*.sensor[*].app[0].startTime = uniform(80s, 90s)
*.sensor[*].app[0].stopTime = 900s

[Config Normal]
description = "Cenário normal: 36 sensores enviando pacotes UDP de 48 B para o sink."

[Config Flooding]
extends = Normal
description = "Ataque Flooding real via módulo C++: sensor[0] gera pacotes de 119 B a cada 0.12 s entre 20 s e 250 s."
*.sensor[0].numApps = 2
*.sensor[0].app[1].typename = "MaliciousFloodingApp"
*.sensor[0].app[1].destAddress = "sink"
*.sensor[0].app[1].destPort = 5000
*.sensor[0].app[1].packetLength = 119B
*.sensor[0].app[1].sendInterval = 0.12s
*.sensor[0].app[1].startTime = 20s
*.sensor[0].app[1].stopTime = 250s

[Config Backoff]
extends = Normal
description = "Backoff manipulado aproximado via módulo C++: sensor[25] atua de modo agressivo, gerando tráfego com intervalo muito baixo."
*.sensor[25].numApps = 2
*.sensor[25].app[1].typename = "AggressiveBackoffApp"
*.sensor[25].app[1].destAddress = "sink"
*.sensor[25].app[1].destPort = 5000
*.sensor[25].app[1].packetLength = 48B
*.sensor[25].app[1].sendInterval = 0.05s
*.sensor[25].app[1].startTime = 200s
*.sensor[25].app[1].stopTime = 250s

[Config Blackhole]
extends = Normal
description = "Blackhole em nível de aplicação: sensor[5] executa módulo C++ de descarte UDP e registra blackholeDroppedPackets."
*.sensor[5].numApps = 2
*.sensor[5].app[1].typename = "BlackholeUdpDropApp"
*.sensor[5].app[1].localPort = 5000
*.sensor[5].app[1].startTime = 200s
*.sensor[5].app[1].stopTime = 250s

# Para forçar parte do tráfego a passar pelo nó malicioso em nível de aplicação,
# alguns sensores enviam ao sensor[5] durante o experimento Blackhole.
# Assim, o sensor[5] descarta os pacotes recebidos e isso aparece nas métricas.
*.sensor[0..4].app[0].destAddresses = "sensor[5]"
*.sensor[6..11].app[0].destAddresses = "sensor[5]"

[Config Wormhole]
extends = Normal
description = "Wormhole via dois endpoints C++: sensor[25] e sensor[15] criam um túnel UDP artificial e encaminham tráfego ao sink."
*.sensor[25].numApps = 2
*.sensor[25].app[1].typename = "WormholeEndpointApp"
*.sensor[25].app[1].peerAddress = "sensor[15]"
*.sensor[25].app[1].peerPort = 7000
*.sensor[25].app[1].localPort = 7000
*.sensor[25].app[1].finalDestAddress = "sink"
*.sensor[25].app[1].finalDestPort = 5000
*.sensor[25].app[1].packetLength = 48B
*.sensor[25].app[1].sendInterval = 0.07s
*.sensor[25].app[1].startTime = 200s
*.sensor[25].app[1].stopTime = 250s
*.sensor[25].app[1].generateAttackTraffic = true

*.sensor[15].numApps = 2
*.sensor[15].app[1].typename = "WormholeEndpointApp"
*.sensor[15].app[1].peerAddress = "sensor[25]"
*.sensor[15].app[1].peerPort = 7000
*.sensor[15].app[1].localPort = 7000
*.sensor[15].app[1].finalDestAddress = "sink"
*.sensor[15].app[1].finalDestPort = 5000
*.sensor[15].app[1].packetLength = 48B
*.sensor[15].app[1].sendInterval = 0.07s
*.sensor[15].app[1].startTime = 200s
*.sensor[15].app[1].stopTime = 250s
*.sensor[15].app[1].generateAttackTraffic = false
