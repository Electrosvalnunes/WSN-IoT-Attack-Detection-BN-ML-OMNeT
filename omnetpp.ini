[General]
network = wsn36.WSN36_Grid_Topology
sim-time-limit = 900s
repeat = 1
seed-set = ${repetition}

# ============================================================
# METODOLOGIA TRADUZIDA PARA OMNeT++/INET + MÓDULOS C++
# ============================================================
# Cenário: 36 sensores + 1 sink
# Área: 400 m x 400 m
# Topologia: grade 6 x 6
# Espaçamento: 80 m
# Sink: centro da rede
# Tempo de simulação: 900 s
# Convergência inicial: 80 s
# Potência de transmissão: 1.2 mW
# Pacotes normais: 48 B
# Cenários: Normal, Flooding, Backoff, Blackhole e Wormhole
# ============================================================

output-scalar-file = results/${configname}-${runnumber}.sca
output-vector-file = results/${configname}-${runnumber}.vec
**.scalar-recording = true
**.vector-recording = true
record-eventlog = false

# Visualização
*.visualizer.*.interfaceTableVisualizer.displayInterfaceTables = true
*.visualizer.*.routingTableVisualizer.displayRoutingTables = false
*.visualizer.*.transportConnectionVisualizer.displayTransportConnections = true
*.visualizer.*.packetDropVisualizer.displayPacketDrops = true
*.visualizer.*.mediumVisualizer.displaySignals = true

# Área física
**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMinZ = 0m
**.constraintAreaMaxX = 400m
**.constraintAreaMaxY = 400m
**.constraintAreaMaxZ = 0m

# Mobilidade fixa
*.sensor[*].mobility.typename = "StationaryMobility"
*.sink.mobility.typename = "StationaryMobility"

# Sink no centro
*.sink.mobility.initialX = 200m
*.sink.mobility.initialY = 200m
*.sink.mobility.initialZ = 0m

# Grade 6 x 6, 36 sensores, espaçamento de 80 m
*.sensor[0].mobility.initialX = 0m
*.sensor[0].mobility.initialY = 0m
*.sensor[1].mobility.initialX = 80m
*.sensor[1].mobility.initialY = 0m
*.sensor[2].mobility.initialX = 160m
*.sensor[2].mobility.initialY = 0m
*.sensor[3].mobility.initialX = 240m
*.sensor[3].mobility.initialY = 0m
*.sensor[4].mobility.initialX = 320m
*.sensor[4].mobility.initialY = 0m
*.sensor[5].mobility.initialX = 400m
*.sensor[5].mobility.initialY = 0m
*.sensor[6].mobility.initialX = 0m
*.sensor[6].mobility.initialY = 80m
*.sensor[7].mobility.initialX = 80m
*.sensor[7].mobility.initialY = 80m
*.sensor[8].mobility.initialX = 160m
*.sensor[8].mobility.initialY = 80m
*.sensor[9].mobility.initialX = 240m
*.sensor[9].mobility.initialY = 80m
*.sensor[10].mobility.initialX = 320m
*.sensor[10].mobility.initialY = 80m
*.sensor[11].mobility.initialX = 400m
*.sensor[11].mobility.initialY = 80m
*.sensor[12].mobility.initialX = 0m
